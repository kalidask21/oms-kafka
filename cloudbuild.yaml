serviceAccount: 'projects/inboxcapital/serviceAccounts/cloud-build-sa@inboxcapital.iam.gserviceaccount.com'

steps:
  # Step 1: Write Docker credentials into shared volume
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - auth
      - configure-docker
      - us-central1-docker.pkg.dev
    volumes:
      - name: 'docker-config'
        path: '/root/.docker'

  # Step 2: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/inboxcapital/oms-kafka/oms-kafka:$BUILD_ID
      - -t
      - us-central1-docker.pkg.dev/inboxcapital/oms-kafka/oms-kafka:latest
      - .
    volumes:
      - name: 'docker-config'
        path: '/root/.docker'

  # Step 3: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/inboxcapital/oms-kafka/oms-kafka
    volumes:
      - name: 'docker-config'
        path: '/root/.docker'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - oms-kafka
      - --image=us-central1-docker.pkg.dev/inboxcapital/oms-kafka/oms-kafka:$BUILD_ID
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --set-env-vars=SPRING_PROFILES_ACTIVE=gcp,SPRING_KAFKA_BOOTSTRAP_SERVERS=<KAFKA_BOOTSTRAP_HOST>:9092

images:
  - us-central1-docker.pkg.dev/inboxcapital/oms-kafka/oms-kafka:$BUILD_ID
  - us-central1-docker.pkg.dev/inboxcapital/oms-kafka/oms-kafka:latest

options:
  logging: NONE
