# Replace REGION and PROJECT_ID before applying, or let cloudbuild.yaml do it via `kubectl set image`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oms-app
  namespace: oms
  labels:
    app: oms-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oms-app
  template:
    metadata:
      labels:
        app: oms-app
    spec:
      containers:
        - name: oms-app
          image: REGION-docker.pkg.dev/PROJECT_ID/oms-kafka/oms-kafka:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: oms-config
          readinessProbe:
            httpGet:
              path: /orders/export
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /orders/export
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 768Mi
